# Default values for piston chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCountApi: 2

env:
  api:
    PISTON_REPO_URL: "http://rce-piston-repo:8000/index"
  repo:
    BASEURL: "http://rce-piston-repo:8000/"

image:
  repositoryApi: "ghcr.io/michaelahli/piston-api"
  repositoryRepo: "ghcr.io/michaelahli/piston-repo"
  pullPolicy: IfNotPresent
  tag: "v0.2.0"

service:
  api:
    annotations: {}
    port: 2000
    targetPort: 2000
    type: ClusterIP
  repo:
    annotations: {}
    port: 8000
    targetPort: 8000
    type: ClusterIP

persistence:
  enabled: true
  storageClass: ""
  # accessMode will be applied to both API and repo volumes. For a shared
  # read-write-many volume, set this to ReadWriteMany and enable
  # `shared` below.
  accessMode: ReadWriteOnce
  # If true, the API deployment/statefulset will use a single persistent
  # volume claim (created by pvc-api.yaml) that is mounted by every replica.
  # This is intended for RWX storage classes. When false (default) each
  # replica gets its own PVC via volumeClaimTemplates.
  shared: false
  sizeApi: 50Gi
  sizeRepo: 50Gi

resources:
  api: {}
  repo: {}

docker:
  enableSocket: false
  socketPath: /var/run/docker.sock
  enableDinD: true
  dindImage: "docker:24-dind"
  privilegedDinD: true
repo:
  gitUrl: "https://github.com/michaelahli/piston"
  gitBranch: "master"
security:
  privileged: true
  hostPID: true

nodeSelector: {}
tolerations: []
affinity: {}

useStateful: true
